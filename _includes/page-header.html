<h1>{{ page.title }}</h1>
{% if page.description %}
<p class="subtitle">{{ page.description }}</p>
{% endif %}
{% if page.tags %}
<ul class="tags">
  {% for tag in page.tags %}
  <li class="tag"><a href="{{ '/' | relative_url }}tags.html?tag={{ tag | url_encode }}">{{ tag }}</a></li>
  {% endfor %}
</ul>
{% endif %}
